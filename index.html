<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "w3.org">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Geometry Dash HTML 4 Edition</title>
    <style type="text/css">
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        #center-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 400px;
            margin-top: -200px;
            margin-left: -400px;
        }
        #game-window {
            position: relative;
            width: 800px;
            height: 400px;
            background-color: #0074D9;
            border: 2px solid #00ffcc;
            overflow: hidden;
        }
        #floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 800px;
            height: 80px;
            background-color: #001122;
            border-top: 4px solid #00ffcc;
            z-index: 10;
        }
        #player {
            position: absolute;
            width: 34px;
            height: 34px;
            background-color: #00ffcc;
            border: 4px solid #001122;
            left: 120px;
            bottom: 80px;
            z-index: 20;
        }
        #player-eye {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ffffff;
            top: 8px;
            left: 8px;
        }
        .spike {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 34px solid #ff0055;
            bottom: 80px;
            z-index: 15;
        }
        .block {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #3b4252;
            border: 2px solid #00ffcc;
            bottom: 80px;
            z-index: 14;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 400px;
            background-color: #000000;
            opacity: 0.85;
            filter: alpha(opacity=85);
            z-index: 100;
            text-align: center;
        }
        .screen-content {
            margin-top: 120px;
        }
        h1 {
            font-size: 36px;
            color: #00ffcc;
            margin-bottom: 15px;
        }
        p {
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 25px;
        }
        .btn {
            background-color: #00ffcc;
            color: #000000;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #score-display {
            position: absolute;
            top: 15px;
            left: 0;
            width: 800px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            z-index: 50;
        }
    </style>
</head>
<body>

<div id="center-wrapper">
    <div id="game-window">
        <div id="score-display">ПОПЫТКА 1 — 0%</div>
        <div id="player"><div id="player-eye"></div></div>
        <div id="floor"></div>
        <div id="scroller-anchor"></div>

        <!-- Главное меню -->
        <div id="menu-screen" class="screen">
            <div class="screen-content">
                <h1>GEOMETRY DASH</h1>
                <p>Нажмите ПРОБЕЛ, СТРЕЛКУ ВВЕРХ или КЛИКНИТЕ для прыжка</p>
                <input type="button" class="btn" value="ИГРАТЬ" onclick="startGame()">
            </div>
        </div>

        <!-- Экран Проигрыша -->
        <div id="gameover-screen" class="screen" style="display: none;">
            <div class="screen-content">
                <h1 style="color: #ff0055;">КРЭШ!</h1>
                <p id="final-progress">Прогресс: 0%</p>
                <input type="button" class="btn" value="ПОВТОРИТЬ" onclick="startGame()" style="background-color: #ff0055;">
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    var gameWindow = document.getElementById('game-window');
    var playerElem = document.getElementById('player');
    var anchor = document.getElementById('scroller-anchor');
    var scoreDisplay = document.getElementById('score-display');
    var menuScreen = document.getElementById('menu-screen');
    var gameoverScreen = document.getElementById('gameover-screen');
    var finalProgress = document.getElementById('final-progress');

    // Настройки физики
    var GRAVITY = 1.2;
    var JUMP_FORCE = -15;
    var BASE_SPEED = 6;
    var FLOOR_Y = 0; // Относительно низа (bottom: 80px)
    var LEVEL_LENGTH = 12000;

    var gameState = 'MENU';
    var distanceTraveled = 0;
    var attemptCount = 1;

    var playerY = 0;
    var playerVy = 0;
    var isGrounded = true;
    var playerSize = 34;
    var playerX = 120;

    var obstacles = [];
    var activeElements = [];

    function triggerJump() {
        if (gameState === 'PLAYING' && isGrounded) {
            playerVy = JUMP_FORCE;
            isGrounded = false;
        }
    }

    // Обработка ввода (HTML4 совместимые события)
    document.onkeydown = function(e) {
        var event = e || window.event;
        if (event.keyCode === 32 || event.keyCode === 38) {
            triggerJump();
            return false;
        }
    };

    gameWindow.onclick = function() {
        triggerJump();
    };

    function generateLevel() {
        obstacles = [];
        var nextSpawnPos = 600;
        
        while (nextSpawnPos < LEVEL_LENGTH) {
            var rand = Math.random();
            if (rand < 0.5) {
                obstacles.push({ x: nextSpawnPos, type: 'spike', width: 30, height: 34 });
                nextSpawnPos += 350 + Math.random() * 200;
            } else {
                obstacles.push({ x: nextSpawnPos, type: 'block', width: 40, height: 40 });
                nextSpawnPos += 400 + Math.random() * 250;
            }
        }
    }

    function clearDOMObstacles() {
        for (var i = 0; i < activeElements.length; i++) {
            gameWindow.removeChild(activeElements[i].dom);
        }
        activeElements = [];
    }

    function syncDOMObstacles() {
        clearDOMObstacles();
        for (var i = 0; i < obstacles.length; i++) {
            var obs = obstacles[i];
            var div = document.createElement('div');
            if (obs.type === 'spike') {
                div.className = 'spike';
            } else {
                div.className = 'block';
            }
            gameWindow.appendChild(div);
            activeElements.push({ data: obs, dom: div });
        }
    }

    function startGame() {
        gameState = 'PLAYING';
        distanceTraveled = 0;
        playerY = 0;
        playerVy = 0;
        isGrounded = true;

        generateLevel();
        syncDOMObstacles();

        menuScreen.style.display = 'none';
        gameoverScreen.style.display = 'none';
        scoreDisplay.innerHTML = 'ПОПЫТКА ' + attemptCount + ' — 0%';
    }

    function handleGameOver() {
        gameState = 'GAMEOVER';
        var percent = Math.min(Math.floor((distanceTraveled / LEVEL_LENGTH) * 100), 100);
        finalProgress.innerHTML = 'Прогресс: ' + percent + '%';
        gameoverScreen.style.display = 'block';
        attemptCount++;
    }

    // Основной игровой цикл на базе setInterval (для старых движков)
    setInterval(function() {
        if (gameState !== 'PLAYING') return;

        distanceTraveled += BASE_SPEED;
        if (distanceTraveled >= LEVEL_LENGTH) {
            distanceTraveled = 0;
        }

        // Физика гравитации
        playerVy += GRAVITY;
        playerY -= playerVy;

        if (playerY <= FLOOR_Y) {
            playerY = FLOOR_Y;
            playerVy = 0;
            isGrounded = true;
        }

        // Рендеринг игрока через стили DOM
        playerElem.style.bottom = (80 + playerY) + 'px';

        // Движение и коллизии препятствий
        for (var i = 0; i < activeElements.length; i++) {
            var item = activeElements[i];
            var localX = item.data.x - distanceTraveled + playerX;

            // Позиционирование элементов на экране
            item.dom.style.left = localX + 'px';

            // Проверка столкновений (AABB)
            var pLeft = playerX;
            var pRight = playerX + playerSize;
            var pBottom = playerY;
            var pTop = playerY + playerSize;

            var oLeft = localX;
            var oRight = localX + item.data.width;
            var oBottom = 0;
            var oTop = item.data.height;

            if (pRight > oLeft && pLeft < oRight && pTop > oBottom && pBottom < oTop) {
                // Обработка приземления на блок сверху
                if (item.data.type === 'block' && (pBottom - playerVy >= oTop - 8)) {
                    playerY = oTop;
                    playerVy = 0;
                    isGrounded = true;
                } else {
                    handleGameOver();
                }
            }
        }

        // Обновление счетчика
        var percent = Math.min(Math.floor((distanceTraveled / LEVEL_LENGTH) * 100), 100);
        scoreDisplay.innerHTML = 'ПОПЫТКА ' + attemptCount + ' — ' + percent + '%';

    }, 1000 / 60); // Лок на 60 FPS через таймер
</script>

</body>
</html>
